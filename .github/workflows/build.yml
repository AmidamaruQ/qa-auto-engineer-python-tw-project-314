name: Python CI
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: make install

      - name: Start application in Docker
        run: make start

      - name: Wait for application
        run: |
          for _ in {1..30}; do
            if curl -fsS "$APP_BASE_URL" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready in time"
          exit 1

      - name: Run linter and tests
        run: make check

      - name: Generate coverage report
        run: test-coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=AmidamaruQ_qa-auto-engineer-python-tw-project-314
            -Dsonar.organization=amidamaruq
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=pages,utils,config.py,settings.py
            -Dsonar.tests=tests
            -Dsonar.test.inclusions=tests/test_*.py
